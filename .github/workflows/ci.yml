name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build MonoGame port
    runs-on: windows-2022
    timeout-minutes: 15

    defaults:
      run:
        shell: pwsh

    env:
      PROJECT_PATH: src\ChrisPuzzleGame.UI\ChrisPuzzleGame.UI.csproj

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies and MonoGame tools
        # ChrisPuzzleGame.UI.csproj restores the local dotnet-mgcb tool manifest before Restore.
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build trusted UI project
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore --nologo /p:ContinuousIntegrationBuild=true
